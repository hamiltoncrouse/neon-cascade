<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Cascade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const TITLE = 0, PLAYING = 1, GAMEOVER = 2;
let gameState = TITLE;

let score = 0, combo = 0, lives = 3;
let paddle = { x: 0, y: 0, w: 120, h: 16 };
let orbs = [], particles = [], bgStars = [];
let spawnTimer = 0, difficulty = 1, lastTime = 0;

const COLORS = ['#0ff', '#f0f', '#0f4', '#ff0', '#a0f'];

function initStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 15 + 5,
      alpha: Math.random() * 0.6 + 0.2
    });
  }
}

function resetGame() {
  score = 0; combo = 0; lives = 3;
  orbs = []; particles = [];
  spawnTimer = 0; difficulty = 1;
  paddle.x = W / 2;
  paddle.y = H - 60;
  paddle.w = Math.min(120, W * 0.28);
  initStars();
}

function spawnOrb() {
  const isGlitch = Math.random() < 0.15 + difficulty * 0.02;
  const color = isGlitch ? '#f33' : COLORS[Math.floor(Math.random() * COLORS.length)];
  const r = Math.random() * 10 + 12;
  orbs.push({
    x: Math.random() * (W - 40) + 20, y: -r, r,
    speed: (Math.random() * 40 + 60) * (1 + difficulty * 0.15),
    color, glitch: isGlitch, glow: 0,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: (Math.random() - 0.5) * 2
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 150 + 50;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 50,
      life: 1, decay: Math.random() * 1.5 + 1, r: Math.random() * 3 + 1, color
    });
  }
}

function movePaddle(clientX) {
  paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, clientX));
}

function startGame() {
  resetGame();
  gameState = PLAYING;
}

function update(dt) {
  if (gameState !== PLAYING) {
    for (const s of bgStars) {
      s.y += s.speed * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
    return;
  }

  difficulty = 1 + score / 500;
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnOrb();
    spawnTimer = Math.max(0.3, 1.2 - difficulty * 0.08);
  }

  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    o.y += o.speed * dt;
    o.wobble += o.wobbleSpeed * dt;
    o.x += Math.sin(o.wobble) * 0.5;
    o.glow = (Math.sin(Date.now() * 0.005) + 1) * 0.5;

    const dx = o.x - Math.max(paddle.x - paddle.w/2, Math.min(o.x, paddle.x + paddle.w/2));
    const dy = o.y - Math.max(paddle.y - paddle.h/2, Math.min(o.y, paddle.y + paddle.h/2));
    if (dx*dx + dy*dy < o.r*o.r) {
      if (o.glitch) {
        lives--; combo = 0;
        spawnParticles(o.x, o.y, '#f33', 15);
        if (lives <= 0) gameState = GAMEOVER;
      } else {
        combo++;
        score += 10 * combo;
        spawnParticles(o.x, o.y, o.color, 12 + combo * 2);
      }
      orbs.splice(i, 1);
      continue;
    }
    if (o.y - o.r > H) {
      if (!o.glitch) combo = 0;
      orbs.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 200 * dt; p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (const s of bgStars) {
    s.y += s.speed * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }
}

function draw() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a1a');
  bg.addColorStop(1, '#1a0a2a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  for (const s of bgStars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (gameState === TITLE) {
    const pulse = (Math.sin(Date.now() * 0.003) + 1) * 0.5;
    ctx.textAlign = 'center';
    ctx.font = 'bold ' + Math.min(56, W * 0.13) + 'px system-ui';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 30;
    ctx.fillText('NEON CASCADE', W/2, H * 0.35);
    ctx.shadowBlur = 0;
    ctx.font = Math.min(18, W * 0.048) + 'px system-ui';
    ctx.fillStyle = '#f0f';
    ctx.fillText('Catch the falling neon orbs', W/2, H * 0.44);
    ctx.font = 'bold ' + Math.min(26, W * 0.065) + 'px system-ui';
    ctx.fillStyle = `rgba(0,255,255,${0.5 + pulse * 0.5})`;
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10 + pulse * 20;
    ctx.fillText('TAP TO PLAY', W/2, H * 0.58);
    ctx.shadowBlur = 0;
    ctx.font = Math.min(13, W * 0.035) + 'px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('Drag to move the paddle', W/2, H * 0.70);
    ctx.fillText('Avoid the red glitch orbs!', W/2, H * 0.75);
    return;
  }

  if (gameState === GAMEOVER) {
    const pulse = (Math.sin(Date.now() * 0.003) + 1) * 0.5;
    ctx.textAlign = 'center';
    ctx.font = 'bold ' + Math.min(48, W * 0.12) + 'px system-ui';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', W/2, H * 0.38);
    ctx.shadowBlur = 0;
    ctx.font = 'bold ' + Math.min(26, W * 0.065) + 'px system-ui';
    ctx.fillStyle = '#fff';
    ctx.fillText('SCORE: ' + score, W/2, H * 0.48);
    ctx.font = 'bold ' + Math.min(22, W * 0.055) + 'px system-ui';
    ctx.fillStyle = `rgba(0,255,255,${0.5 + pulse * 0.5})`;
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10 + pulse * 15;
    ctx.fillText('TAP TO PLAY AGAIN', W/2, H * 0.60);
    ctx.shadowBlur = 0;
    return;
  }

  // Orbs
  for (const o of orbs) {
    ctx.save();
    const glowSize = 20 + o.glow * 10;
    const grad = ctx.createRadialGradient(o.x, o.y, o.r * 0.3, o.x, o.y, o.r + glowSize);
    grad.addColorStop(0, o.color);
    grad.addColorStop(0.4, o.color + (o.glitch ? '88' : 'aa'));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r + glowSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = o.color;
    ctx.shadowColor = o.color; ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(o.x - o.r*0.25, o.y - o.r*0.25, o.r*0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    if (o.glitch) {
      ctx.save();
      ctx.strokeStyle = '#f33'; ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // Paddle
  ctx.save();
  const pg = ctx.createLinearGradient(paddle.x - paddle.w/2, 0, paddle.x + paddle.w/2, 0);
  pg.addColorStop(0, '#0ff'); pg.addColorStop(0.5, '#08f'); pg.addColorStop(1, '#0ff');
  ctx.fillStyle = pg;
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
  const pr = 8, px = paddle.x - paddle.w/2, py = paddle.y - paddle.h/2;
  ctx.beginPath();
  ctx.moveTo(px+pr, py);
  ctx.lineTo(px+paddle.w-pr, py);
  ctx.quadraticCurveTo(px+paddle.w, py, px+paddle.w, py+pr);
  ctx.lineTo(px+paddle.w, py+paddle.h-pr);
  ctx.quadraticCurveTo(px+paddle.w, py+paddle.h, px+paddle.w-pr, py+paddle.h);
  ctx.lineTo(px+pr, py+paddle.h);
  ctx.quadraticCurveTo(px, py+paddle.h, px, py+paddle.h-pr);
  ctx.lineTo(px, py+pr);
  ctx.quadraticCurveTo(px, py, px+pr, py);
  ctx.fill();
  ctx.restore();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // HUD
  ctx.font = 'bold 20px system-ui';
  ctx.fillStyle = '#0ff'; ctx.textAlign = 'left';
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
  ctx.fillText('SCORE: ' + score, 16, 36);
  ctx.shadowBlur = 0;
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '♥ ';
  ctx.fillStyle = '#f55'; ctx.textAlign = 'right';
  ctx.shadowColor = '#f55'; ctx.shadowBlur = 10;
  ctx.fillText(hearts.trim(), W - 16, 36);
  ctx.shadowBlur = 0;
  if (combo > 1) {
    ctx.font = 'bold 16px system-ui';
    ctx.fillStyle = '#f0f'; ctx.textAlign = 'left';
    ctx.shadowColor = '#f0f'; ctx.shadowBlur = 8;
    ctx.fillText('COMBO x' + combo, 16, 60);
    ctx.shadowBlur = 0;
  }
}

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  if (gameState === PLAYING) {
    movePaddle(e.clientX);
  } else {
    startGame();
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (gameState === PLAYING) movePaddle(e.clientX);
});

initStars();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
